<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Maintenance | {{ site_name }}</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:#080808;font-family:'JetBrains Mono',monospace;min-height:100vh;display:flex;align-items:center;justify-content:center}
    .card{background:#0a0a0a;border:3px solid #ef4444;border-radius:12px;padding:48px 40px;text-align:center;max-width:400px;box-shadow:0 0 40px #ef444422}
    .icon{font-size:56px;margin-bottom:16px;filter:drop-shadow(0 0 16px #ef4444)}
    .title{font-size:20px;font-weight:700;color:#ef4444;letter-spacing:3px;text-shadow:0 0 12px #ef4444;margin-bottom:8px}
    .sub{font-size:12px;color:#6b7280;letter-spacing:2px;margin-bottom:24px}
    .message{background:#111;border:2px solid #2a2a2a;border-radius:8px;padding:14px 16px;font-size:14px;color:#d1d5db;line-height:1.6;margin-bottom:24px}
    .cursor{display:inline-block;width:10px;height:16px;background:#ef4444;margin-left:4px;vertical-align:middle;animation:blink 1s step-end infinite}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
    .footer{font-size:11px;color:#374151;letter-spacing:1px}
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🔧</div>
    <div class="title">MAINTENANCE MODE</div>
    <div class="sub">{{ site_name }} SYSTEMS<span class="cursor"></span></div>
    <div class="message">{{ message }}</div>
    <div class="footer">PLEASE CHECK BACK LATER</div>
  </div>
</body>
</html>
